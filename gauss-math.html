<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高思数学 × 宝可梦</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0c29;
  --accent: #FFD700;
  --accent2: #FF6B6B;
  --text: #f0f0ff;
  --muted: #8b8bc0;
  --green: #4ade80;
  --red: #f87171;
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Nunito', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(108,92,231,0.28) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(255,107,107,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 55% 45%, rgba(253,203,110,0.1) 0%, transparent 60%);
  pointer-events:none;
}

.sparks { position:fixed; inset:0; z-index:0; pointer-events:none; }
.sparks span {
  position:absolute; border-radius:50%; opacity:0;
  animation: twinkle var(--d,3s) var(--dl,0s) infinite;
}
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:.9;transform:scale(1)} }

/* ── LAYOUT ── */
.wrap { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:20px 14px 100px; }

/* ── HEADER ── */
.header { text-align:center; padding:16px 0 24px; }
.logo {
  font-family:'Fredoka One',sans-serif; font-size:2rem; letter-spacing:1px;
  background:linear-gradient(135deg,#FFD700 0%,#FF6B6B 45%,#a78bfa 90%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 10px rgba(255,215,0,.4));
}
.header-sub { font-size:.88rem; color:var(--muted); font-weight:700; margin-top:4px; }
.date-pill {
  display:inline-block; margin-top:10px;
  background:rgba(255,215,0,.12); border:1.5px solid rgba(255,215,0,.35);
  border-radius:20px; padding:4px 16px; font-size:.8rem; font-weight:800; color:var(--accent);
}

/* ── STREAK BANNER ── */
.streak-banner {
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
  background:rgba(255,255,255,.04); border:1.5px solid rgba(167,139,250,.25);
  border-radius:16px; padding:14px 18px; margin-bottom:16px;
}
.st-item { display:flex; flex-direction:column; align-items:center; }
.st-val { font-family:'Fredoka One',sans-serif; font-size:1.6rem; color:var(--accent); }
.st-label { font-size:.72rem; color:var(--muted); font-weight:700; }
.streak-dots { display:flex; gap:5px; margin-top:4px; }
.s-dot {
  width:26px; height:26px; border-radius:50%; border:2px solid rgba(255,255,255,.12);
  display:flex; align-items:center; justify-content:center; font-size:.8rem;
}
.s-dot.done { background:rgba(255,215,0,.18); border-color:var(--accent); }
.s-dot.now  { background:rgba(74,222,128,.15); border-color:var(--green); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)} 50%{box-shadow:0 0 0 8px rgba(74,222,128,0)} }

/* ── TABS ── */
.tabs { display:flex; gap:6px; margin-bottom:20px; }
.tab {
  flex:1; padding:11px 6px; border:none; border-radius:14px;
  font-family:inherit; font-size:.82rem; font-weight:800; cursor:pointer;
  background:rgba(255,255,255,.06); color:var(--muted);
  border:1.5px solid rgba(255,255,255,.08); transition:all .2s;
}
.tab .ti { display:block; font-size:1.15rem; margin-bottom:2px; }
.tab.on { background:rgba(167,139,250,.2); color:var(--text); border-color:rgba(167,139,250,.5); box-shadow:0 4px 16px rgba(167,139,250,.2); }
.tbadge { background:var(--accent2); color:#fff; border-radius:8px; padding:1px 6px; font-size:.65rem; margin-left:3px; }
.tab.on .tbadge { background:rgba(255,255,255,.25); }

/* ── PANELS ── */
.panel { display:none; }
.panel.on { display:block; }

/* ── CARDS ── */
.draw-hint { text-align:center; font-size:.88rem; color:var(--muted); font-weight:700; line-height:1.6; margin-bottom:18px; }
.draw-hint strong { color:var(--text); }

.prog-row { display:flex; gap:10px; justify-content:center; margin-bottom:18px; }
.p-dot {
  width:34px; height:34px; border-radius:50%;
  border:2px solid rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center;
  font-size:.9rem; transition:all .3s;
}
.p-dot.done { border-color:var(--green); background:rgba(74,222,128,.15); }
.p-dot.active { border-color:var(--accent); background:rgba(255,215,0,.1); animation:pulse 1.5s infinite; }

.cards-row { display:flex; gap:14px; justify-content:center; margin-bottom:26px; perspective:900px; }

/* ── SINGLE CARD ── */
.p-card {
  width:148px; height:210px; position:relative; cursor:pointer;
  transform-style:preserve-3d;
  transition:transform .65s cubic-bezier(.34,1.2,.64,1);
  border-radius:18px;
  animation:cardFloat 3s ease-in-out infinite;
}
.p-card:nth-child(2) { animation-delay:.35s; }
.p-card:nth-child(3) { animation-delay:.7s; }
@keyframes cardFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.p-card.flipped { transform:rotateY(180deg)!important; animation:none!important; }
.p-card.selected .c-front { box-shadow:0 0 0 3px var(--accent),0 12px 40px rgba(255,215,0,.3); }
.p-card.used { opacity:.35; pointer-events:none; }
.p-card:not(.flipped):hover { transform:translateY(-10px) scale(1.04)!important; animation-play-state:paused; }
.p-card:not(.flipped):hover .c-back { border-color:rgba(255,215,0,.8); box-shadow:0 12px 40px rgba(255,215,0,.25),inset 0 0 60px rgba(255,215,0,.06); }

.c-face { position:absolute; inset:0; border-radius:18px; backface-visibility:hidden; -webkit-backface-visibility:hidden; }

/* BACK face */
.c-back {
  background:linear-gradient(145deg,#2a2660,#1a1750);
  border:2px solid rgba(167,139,250,.4);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  overflow:hidden;
}
.c-back .shine {
  position:absolute; inset:0; border-radius:18px;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.08) 50%,transparent 70%);
  animation:shineMove 2.5s linear infinite;
}
@keyframes shineMove { from{background-position:-200% 0} to{background-position:200% 0} }
.c-back .ball-img { width:54px; height:54px; image-rendering:pixelated; filter:drop-shadow(0 2px 8px rgba(167,139,250,.5)); }
.c-back .back-lbl { font-size:.65rem; font-weight:900; color:rgba(167,139,250,.75); letter-spacing:2px; text-transform:uppercase; }

/* FRONT face */
.c-front {
  transform:rotateY(180deg);
  border:2px solid rgba(255,255,255,.15);
  box-shadow:0 8px 30px rgba(0,0,0,.5);
  display:flex; flex-direction:column; align-items:center; justify-content:space-between;
  padding:10px 8px 10px; overflow:hidden;
}
.c-front.r-common    { background:linear-gradient(160deg,#1b3a72,#2855a8); border-color:rgba(100,160,255,.4); }
.c-front.r-rare      { background:linear-gradient(160deg,#4a1a8a,#7c3aed); border-color:rgba(167,139,250,.6); }
.c-front.r-legendary { background:linear-gradient(160deg,#7c2d00,#c2410c); border-color:rgba(251,146,60,.6); box-shadow:0 8px 28px rgba(251,146,60,.2); }
.c-front.r-mythic    { background:linear-gradient(160deg,#831843,#be185d); border-color:rgba(244,114,182,.7); box-shadow:0 8px 28px rgba(244,114,182,.3); }

.c-rarity {
  align-self:flex-start; font-size:.58rem; font-weight:900; letter-spacing:2px; text-transform:uppercase;
  padding:2px 8px; border-radius:6px;
}
.r-common    .c-rarity { background:rgba(100,160,255,.2); color:#93c5fd; }
.r-rare      .c-rarity { background:rgba(167,139,250,.2); color:#c4b5fd; }
.r-legendary .c-rarity { background:rgba(251,146,60,.2);  color:#fdba74; }
.r-mythic    .c-rarity { background:rgba(244,114,182,.2); color:#f9a8d4; }

/* Pokemon sprite on card */
.c-sprite-wrap {
  width:90px; height:90px; display:flex; align-items:center; justify-content:center;
  position:relative;
}
.c-sprite {
  max-width:90px; max-height:90px;
  image-rendering:auto;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,.55));
  animation:cardFloat 2.5s ease-in-out infinite;
  object-fit:contain;
}
.c-sprite-wrap::after {
  content:''; position:absolute; bottom:-4px; left:50%; transform:translateX(-50%);
  width:50px; height:10px; border-radius:50%;
  background:rgba(0,0,0,.35); filter:blur(4px);
}

.c-name {
  font-family:'Fredoka One',sans-serif; font-size:.95rem; text-align:center; line-height:1.2;
}
.c-type {
  font-size:.6rem; font-weight:800; color:rgba(255,255,255,.55);
  background:rgba(0,0,0,.25); border-radius:8px; padding:3px 8px;
  width:100%; text-align:center;
}

/* ── QUESTION BOX ── */
.q-box {
  background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.1);
  border-radius:var(--radius); padding:20px 18px;
  margin-bottom:18px; display:none;
  animation:slideUp .4s cubic-bezier(.34,1.2,.64,1);
}
.q-box.show { display:block; }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
.q-box.ok  { border-color:rgba(74,222,128,.5);  background:rgba(74,222,128,.04); }
.q-box.no  { border-color:rgba(248,113,113,.5); background:rgba(248,113,113,.04); }

.q-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
.pill-e { padding:3px 11px; border-radius:10px; font-size:.72rem; font-weight:900; background:linear-gradient(135deg,#FDCB6E,#e17055); color:#fff; }
.pill-h { padding:3px 11px; border-radius:10px; font-size:.72rem; font-weight:900; background:linear-gradient(135deg,#6C5CE7,#a78bfa); color:#fff; }
.q-chap { font-size:.72rem; color:var(--muted); font-weight:700; }

.q-poke-row {
  display:flex; align-items:center; gap:12px;
  background:rgba(255,255,255,.04); border-radius:12px; padding:10px 14px; margin-bottom:12px;
}
.q-poke-img { width:64px; height:64px; object-fit:contain; image-rendering:auto; filter:drop-shadow(0 2px 8px rgba(0,0,0,.5)); }
.q-poke-info .top { font-size:.72rem; color:var(--muted); font-weight:700; }
.q-poke-info .name { font-family:'Fredoka One',sans-serif; font-size:1rem; color:var(--text); }

.q-text {
  font-size:1rem; line-height:1.9; font-weight:600; color:var(--text);
  background:rgba(0,0,0,.2); border-radius:12px; padding:14px 16px;
  margin-bottom:14px; border-left:4px solid rgba(167,139,250,.4);
}
.q-box.ok .q-text { border-left-color:var(--green); }
.q-box.no .q-text { border-left-color:var(--red); }

.ans-row { display:flex; gap:8px; flex-wrap:wrap; }
.ans-in {
  flex:1; min-width:120px; padding:11px 15px;
  background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.12);
  border-radius:12px; font-family:inherit; font-size:.95rem; font-weight:700;
  color:var(--text); outline:none; transition:border-color .2s;
}
.ans-in:focus { border-color:rgba(167,139,250,.7); }
.ans-in:disabled { opacity:.45; }
.ans-in::placeholder { color:rgba(255,255,255,.22); }

.btn-sub {
  padding:11px 22px; border:none; border-radius:12px;
  font-family:inherit; font-size:.9rem; font-weight:900; cursor:pointer;
  background:linear-gradient(135deg,#6C5CE7,#a78bfa); color:#fff;
  box-shadow:0 4px 16px rgba(108,92,231,.4); transition:all .18s; white-space:nowrap;
}
.btn-sub:hover { transform:translateY(-1px); box-shadow:0 6px 22px rgba(108,92,231,.55); }
.btn-sub:disabled { opacity:.4; cursor:default; transform:none; }

.fb { margin-top:10px; padding:8px 14px; border-radius:10px; font-size:.88rem; font-weight:800; display:none; animation:popIn .3s cubic-bezier(.34,1.56,.64,1); }
.fb.show { display:block; }
.fb.ok { background:rgba(74,222,128,.14); color:var(--green); }
.fb.no { background:rgba(248,113,113,.14); color:var(--red); }
.hint { margin-top:6px; padding:8px 14px; border-radius:10px; font-size:.8rem; color:rgba(167,139,250,.9); font-weight:700; background:rgba(167,139,250,.1); display:none; }
.hint.show { display:block; }
@keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }

.new-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:14px; margin-top:8px;
  border:2px dashed rgba(167,139,250,.3); border-radius:16px;
  background:rgba(167,139,250,.05); font-family:inherit;
  font-size:.9rem; font-weight:800; color:var(--muted); cursor:pointer; transition:all .2s;
}
.new-btn:hover { border-color:rgba(167,139,250,.6); color:var(--text); background:rgba(167,139,250,.1); }

/* ── REWARD OVERLAY ── */
.overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.78); backdrop-filter:blur(8px);
  align-items:center; justify-content:center; flex-direction:column;
}
.overlay.show { display:flex; }

.r-card {
  background:linear-gradient(160deg,#1a1750,#2d1b69);
  border-radius:28px; padding:32px 28px 26px;
  text-align:center; max-width:300px; width:90%;
  position:relative; overflow:hidden;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
.r-card.lg { background:linear-gradient(160deg,#431407,#7c2d12); border:2px solid rgba(251,146,60,.5); box-shadow:0 0 60px rgba(251,146,60,.25); }
.r-card.my { background:linear-gradient(160deg,#500724,#831843); border:2px solid rgba(244,114,182,.5); box-shadow:0 0 60px rgba(244,114,182,.25); }
.r-card.ra { border:2px solid rgba(167,139,250,.5); box-shadow:0 0 40px rgba(167,139,250,.2); }

.r-sparkle { font-size:1.5rem; letter-spacing:4px; margin-bottom:6px; }
.r-rarity-label { font-size:.68rem; font-weight:900; letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
.r-sprite-wrap {
  width:160px; height:160px; margin:10px auto;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.r-sprite-wrap::after {
  content:''; position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
  width:80px; height:14px; border-radius:50%;
  background:rgba(0,0,0,.4); filter:blur(5px);
}
.r-sprite {
  max-width:140px; max-height:140px;
  object-fit:contain; image-rendering:auto;
  filter:drop-shadow(0 4px 20px rgba(255,215,0,.35));
  animation:bobble .7s ease-in-out infinite alternate; z-index:1; position:relative;
}
@keyframes bobble { from{transform:translateY(0) scale(1)} to{transform:translateY(-12px) scale(1.06)} }
.r-title { font-family:'Fredoka One',sans-serif; font-size:1.3rem; color:var(--accent); margin-bottom:4px; }
.r-sub { font-size:.84rem; color:var(--muted); font-weight:700; margin-bottom:18px; }
.r-milestone { background:rgba(255,215,0,.15); border:1.5px solid rgba(255,215,0,.3); border-radius:10px; padding:6px 14px; font-size:.78rem; font-weight:800; color:var(--accent); margin-bottom:14px; }
.btn-collect {
  background:linear-gradient(135deg,#FFD700,#f59e0b); color:#1a1200;
  border:none; border-radius:50px; padding:12px 32px;
  font-family:inherit; font-size:.95rem; font-weight:900; cursor:pointer;
  box-shadow:0 4px 20px rgba(255,215,0,.35); transition:all .2s;
}
.btn-collect:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(255,215,0,.5); }

/* ── POKEDEX ── */
.sec-hd { font-family:'Fredoka One',sans-serif; font-size:1.1rem; margin-bottom:14px; color:var(--accent); }
.dex-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.dex-item {
  background:rgba(255,255,255,.05); border:1.5px solid rgba(255,255,255,.08);
  border-radius:14px; padding:12px 6px; text-align:center; transition:all .2s;
}
.dex-item:hover { background:rgba(255,255,255,.09); transform:translateY(-2px); }
.dex-item.d-rare { border-color:rgba(167,139,250,.4); background:rgba(167,139,250,.07); }
.dex-item.d-legendary { border-color:rgba(251,146,60,.5); background:rgba(251,146,60,.08); box-shadow:0 0 12px rgba(251,146,60,.12); }
.dex-item.d-mythic { border-color:rgba(244,114,182,.5); background:rgba(244,114,182,.08); box-shadow:0 0 12px rgba(244,114,182,.12); }
.dex-sprite { width:64px; height:64px; object-fit:contain; image-rendering:auto; display:block; margin:0 auto 4px; }
.dex-name { font-size:.7rem; font-weight:800; color:var(--text); line-height:1.2; }
.dex-date { font-size:.6rem; color:var(--muted); margin-top:2px; }
.dex-streak { font-size:.6rem; color:var(--accent); font-weight:800; }

/* ── LOG ── */
.log-list { display:flex; flex-direction:column; gap:10px; }
.log-item { background:rgba(74,222,128,.05); border:1.5px solid rgba(74,222,128,.2); border-radius:14px; padding:14px 16px; }
.log-chap { font-size:.72rem; font-weight:800; color:var(--green); margin-bottom:4px; }
.log-q { font-size:.88rem; font-weight:600; color:var(--text); line-height:1.6; }
.log-ans { font-size:.78rem; font-weight:800; color:#a78bfa; margin-top:4px; }

.empty { text-align:center; padding:50px 0; color:var(--muted); font-weight:700; }
.empty span { font-size:3rem; display:block; margin-bottom:10px; }

@media(max-width:480px){
  .cards-row { gap:8px; }
  .p-card { width:108px; height:160px; }
  .c-sprite-wrap { width:68px; height:68px; }
  .c-sprite { max-width:68px; max-height:68px; }
  .dex-grid { grid-template-columns:repeat(3,1fr); }
}

/* Image loading */
img { transition: opacity .3s; }
/* ── LIVES ── */
.lives { font-size:.95rem; margin-left:auto; letter-spacing:3px; }
/* ── REPLACE BUTTON ── */
.btn-replace {
  width:100%; margin-top:8px; padding:10px 16px;
  background:rgba(251,191,36,.1); border:1.5px solid rgba(251,191,36,.35);
  border-radius:12px; color:#fbbf24; font-family:inherit; font-size:.88rem;
  font-weight:800; cursor:pointer; transition:all .2s;
}
.btn-replace:hover { background:rgba(251,191,36,.2); border-color:rgba(251,191,36,.6); }
/* ── LAST CHANCE BUTTON ── */
.btn-last {
  background:linear-gradient(135deg,#dc2626,#ef4444)!important;
  box-shadow:0 4px 16px rgba(239,68,68,.4)!important;
  animation:urgentPulse 1.2s ease-in-out infinite;
}
@keyframes urgentPulse {
  0%,100%{box-shadow:0 4px 16px rgba(239,68,68,.35)}
  50%{box-shadow:0 4px 26px rgba(239,68,68,.7)}
}
/* ── FAILED MSG ── */
.failed-msg {
  margin-top:10px; padding:10px 14px; border-radius:10px;
  background:rgba(248,113,113,.08); border:1.5px solid rgba(248,113,113,.3);
  font-size:.86rem; font-weight:700; color:#f87171; line-height:1.7;
}
/* ── FAIL PROGRESS DOT ── */
.p-dot.fail { border-color:#f87171!important; background:rgba(248,113,113,.15)!important; }
/* ── DISABLED NEW-DRAW BUTTON ── */
.new-btn:disabled { opacity:.38; cursor:not-allowed; }
.new-btn:disabled:hover { background:rgba(167,139,250,.05); border-color:rgba(255,255,255,.08); color:var(--muted); transform:none; }
/* ── TOAST ── */
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(90px);
  background:rgba(20,16,60,.97); border:1.5px solid rgba(167,139,250,.45);
  border-radius:16px; padding:11px 22px;
  font-size:.88rem; font-weight:800; color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  z-index:300; transition:transform .38s cubic-bezier(.34,1.2,.64,1), opacity .3s;
  opacity:0; white-space:nowrap; max-width:90vw; text-align:center;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
/* shimmer */
@keyframes shimmerLoad { from{background-position:200% 0} to{background-position:-200% 0} }
</style>
</head>
<body>

<div class="sparks" id="sparks"></div>
<div class="toast" id="toast"></div>

<!-- REWARD OVERLAY -->
<div class="overlay" id="overlay">
  <div class="r-card" id="rCard">
    <div class="r-sparkle" id="rSparkle">✨🎊✨</div>

/* =====================================================
   STATE
===================================================== */
let S = {
  // q status: 'pending'|'wrong1'(1 retry left)|'wrong2'(replace or last try)|'correct'|'failed'
  todayQ:[], drawn:[], flipped:[], sel:null,
  correctLog:[], dex:[],
  streak:0, lastDate:'',
  usedE:[], usedH:[],
  milestones:[],
  rewarded:false,
  newDrawUsed:false,  // full-set swap — once per day
  replaceLeft:2,      // single-q replacements left today
  gameOver:false,
};
function load(){
  try{
    // Try current key first
    const d=JSON.parse(localStorage.getItem('pm_v6')||'null');
    if(d){ S=d; return; }
    // Migrate from pm_v5 or pm_v4 — keep all progress, force fresh cards
    const old = JSON.parse(localStorage.getItem('pm_v5')||null)
             || JSON.parse(localStorage.getItem('pm_v4')||null);
    if(old){
      S.streak     = old.streak     || 0;
      S.correctLog = old.correctLog || [];
      S.dex        = old.dex        || [];
      S.usedE      = old.usedE      || [];
      S.usedH      = old.usedH      || [];
      S.milestones = old.milestones || [];
      S.lastDate   = '';  // force fresh genDraw with corrected card ratio
      localStorage.removeItem('pm_v5');
      localStorage.removeItem('pm_v4');
    }
  }catch(e){}
}
function save(){ localStorage.setItem('pm_v6',JSON.stringify(S)); }

/* =====================================================
   HELPERS
===================================================== */
function today(){ const d=new Date(); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function rand(a){ return a[Math.floor(Math.random()*a.length)]; }
function pickQ(type){
  const used=type==='easy'?S.usedE:S.usedH;
  let pool=QS.filter(q=>q.type===type&&!used.includes(q.id));
  if(!pool.length){ if(type==='easy')S.usedE=[];else S.usedH=[]; pool=QS.filter(q=>q.type===type); }
  return rand(pool);
}

/* =====================================================
   SPARKLES
===================================================== */
function initSparks(){
  const c=document.getElementById('sparks');
  const cols=['#fff','#FFD700','#a78bfa','#81ecec','#f9a8d4'];
  for(let i=0;i<50;i++){
    const s=document.createElement('span');
    const sz=1+Math.random()*3;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${sz}px;height:${sz}px;background:${rand(cols)};
      --d:${2+Math.random()*4}s;--dl:${-Math.random()*5}s`;
    c.appendChild(s);
  }
}

/* =====================================================
   INIT
===================================================== */
function init(){
  load(); initSparks();
  document.getElementById('datePill').textContent='📅 '+today();
  if(S.lastDate!==today()){
    S.lastDate=today();
    S.rewarded=false; S.newDrawUsed=false; S.replaceLeft=2; S.gameOver=false;
    genDraw();   // genDraw no longer resets S.rewarded
    save();
  }
  renderAll();
}

/* =====================================================
   GENERATE 3 CARDS
===================================================== */
function genDraw(){
  // 3 cards: 1 easy + 2 hard (fixed ratio)
  const eq = pickQ('easy');
  const hq1 = pickQ('hard');
  const exclude = [eq.id, hq1.id];
  let hq2 = pickQ('hard'); let att = 0;
  while(exclude.includes(hq2.id) && att < 20){ hq2 = pickQ('hard'); att++; }
  S.drawn = [eq, hq1, hq2];
  S.flipped = []; S.sel = null;
  S.todayQ = S.drawn.map((q,i) => ({...q, status:'pending', userAnswer:'', ci:i}));
  // NOTE: do NOT touch S.rewarded here — managed externally
}

function newDraw(){
  if(S.newDrawUsed){ showToast('今天已经换过一次了，明天再换吧 😊'); return; }
  const wasRewarded = S.rewarded;   // preserve reward state
  genDraw();
  S.rewarded = wasRewarded;         // restore — swapping cards can't earn extra reward
  S.newDrawUsed = true;
  save(); renderAll();
  showToast('🎲 换题成功！今日不能再换了哦');
}

// Replace a single question at slot idx (only when status==='wrong2')
function replaceQ(idx){
  if(S.replaceLeft<=0){ showToast('今天的换题机会用完了！💪 试试最后一次！'); return; }
  const tq=S.todayQ[idx];
  if(tq.status!=='wrong2') return;
  const exclude=S.todayQ.map(q=>q.id);
  let newQ=pickQ(tq.type); let att=0;
  while(exclude.includes(newQ.id)&&att<15){ newQ=pickQ(tq.type); att++; }
  const wasRewarded2 = S.rewarded;  // preserve — replacing a card can't re-earn reward
  S.drawn[idx]={...newQ};
  S.todayQ[idx]={...newQ,status:'pending',userAnswer:'',ci:idx};
  S.flipped=S.flipped.filter(i=>i!==idx);  // flip new card face-down
  S.rewarded = wasRewarded2;
  S.replaceLeft--;
  S.sel=null;
  save(); renderAll();
  const msg = S.replaceLeft>0
    ? `🎴 换题成功！还可以再换 ${S.replaceLeft} 道题`
    : '🎴 换题成功！这是最后一次换题机会了';
  showToast(msg);
}

/* =====================================================
   RENDER ALL
===================================================== */
function renderAll(){ renderStats(); renderCards(); renderQArea(); renderProg(); renderDex(); renderLog(); }

/* =====================================================
   STATS
===================================================== */
const MSTONES=[3,5,7,10,14,21,30];
function renderStats(){
  document.getElementById('svStreak').textContent=S.streak;
  document.getElementById('svCorrect').textContent=S.correctLog.length;
  document.getElementById('svDex').textContent=S.dex.length;
  document.getElementById('dexBadge').textContent=S.dex.length;
  document.getElementById('logBadge').textContent=S.correctLog.length;

  const nextM=MSTONES.find(m=>m>S.streak)||MSTONES[MSTONES.length-1];
  const prevM=MSTONES.filter(m=>m<=S.streak).pop()||0;
  const range=Math.min(nextM-prevM,7);
  const done=S.streak-prevM;
  const dots=document.getElementById('sDots');
  dots.innerHTML='';
  for(let i=0;i<range;i++){
    const d=document.createElement('div');
    d.className='s-dot'+(i<done?' done':i===done?' now':'');
    d.textContent=i<done?'⭐':i===done?'🔥':'·';
    dots.appendChild(d);
  }
  document.getElementById('nextMLabel').textContent=`连续${nextM}天得稀有宝可梦`;
}

/* =====================================================
   CARDS
===================================================== */
function rarityClass(q){ return q.type==='hard'?'r-rare':'r-common'; }
function rarityText(q){ return q.type==='hard'?'★ HARD':'◇ EASY'; }

function renderCards(){
  const row=document.getElementById('cardsRow');
  row.innerHTML='';
  S.drawn.forEach((q,i)=>{
    const tq=S.todayQ[i];
    const isFlipped=S.flipped.includes(i);
    const isSel=S.sel===i;
    const isUsed=tq.status!=='pending'&&!isSel;
    const spUrl=SPRITE(q.poke.id);

    const card=document.createElement('div');
    card.className=`p-card${isFlipped?' flipped':''}${isSel?' selected':''}${isUsed?' used':''}`;
    card.id='card'+i;
    card.onclick=()=>onCard(i);
    card.innerHTML=`
      <div class="c-face c-back">
        <div class="shine"></div>
        <div style="font-size:3rem;line-height:1;filter:drop-shadow(0 2px 8px rgba(167,139,250,.6))">⚾</div>
        <div class="back-lbl">翻开!</div>
      </div>
      <div class="c-face c-front ${rarityClass(q)}">
        <div class="c-rarity">${rarityText(q)}</div>
        <div class="c-sprite-wrap">
          <img class="c-sprite" src="${spUrl}" alt="${q.poke.name}"
               onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/pokeapi-sprites@2.0.4/sprites/pokemon/${q.poke.id}.png'">
        </div>
        <div class="c-name">${q.poke.name}</div>
        <div class="c-type">${q.type==='easy'?'⭐ 基础题':'🔥 挑战题'} · ${q.ch.split('·')[0]}</div>
      </div>`;
    row.appendChild(card);
  });
}

function onCard(i){
  const isFlipped=S.flipped.includes(i);
  if(!isFlipped){ S.flipped.push(i); }
  S.sel=i;
  save();
  setTimeout(()=>{ renderCards(); renderQArea(); renderProg(); },isFlipped?0:320);
}

/* =====================================================
   QUESTION AREA
===================================================== */
function renderQArea(){
  const area=document.getElementById('qArea');
  if(S.sel===null){ area.innerHTML=''; return; }
  const tq=S.todayQ[S.sel];
  if(!tq){ area.innerHTML=''; return; }
  const done=tq.status!=='pending';
  const spUrl=ARTWORK(tq.poke.id);

  const isOk   = tq.status==='correct';
  const isW1   = tq.status==='wrong1';
  const isW2   = tq.status==='wrong2';
  const isFail = tq.status==='failed';
  const locked = isOk||isFail||S.gameOver;
  const boxCls = isOk?'ok':(isW1||isW2||isFail)?'no':'';
  const lives  = isOk?'🟢🟢':isFail?'⬛⬛':isW2?'🔴⬛':isW1?'🔴🟢':'🟢🟢';

  // Build action area
  let action='';
  if(!isOk && !isFail && !S.gameOver){
    const ph  = isW2?'最后机会，仔细想想…':isW1?'重新填写答案…':'写出你的答案…';
    const lbl = isW2?'🎯 最后一次机会！':isW1?'🔄 再试一次':'✅ 提交';
    const cls = isW2?'btn-sub btn-last':'btn-sub';
    action += `<div class="ans-row">
      <input class="ans-in" id="ai" placeholder="${ph}"
             onkeydown="if(event.key==='Enter')checkAns()">
      <button class="${cls}" onclick="checkAns()">${lbl}</button>
    </div>`;
  }
  if(isW2 && S.replaceLeft>0 && !S.gameOver){
    action += `<button class="btn-replace" onclick="replaceQ(${S.sel})">
      🎴 换一道新题（还剩 ${S.replaceLeft} 次机会）
    </button>`;
  }
  if(isFail){
    action += `<div class="failed-msg">😢 这道题今天没答出来，明天继续加油！</div>`;
  }
  if(S.gameOver && !isOk){
    action = `<div class="failed-msg">🚫 今天的挑战机会已全部用完，明天继续加油！</div>`;
  }

  // Feedback line
  let fbHtml='', fbCls='';
  if(isOk){       fbHtml=`🎉 答对了！${tq.poke.name} 向你跑来！`; fbCls='show ok'; }
  else if(isW1){  fbHtml='💪 第一次没对，还有一次机会，再仔细想想！'; fbCls='show no'; }
  else if(isW2){  fbHtml='😬 还是不对！可以再答一次，或者换一道新题'; fbCls='show no'; }

  area.innerHTML=`
    <div class="q-box show ${boxCls}">
      <div class="q-meta">
        <span class="${tq.type==='easy'?'pill-e':'pill-h'}">${tq.type==='easy'?'⭐ 基础题':'🔥 挑战题'}</span>
        <span class="q-chap">${tq.ch} · ${tq.lbl}</span>
        <span class="lives">${lives}</span>
      </div>
      <div class="q-poke-row">
        <img class="q-poke-img" src="${spUrl}" alt="${tq.poke.name}"
             onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/pokeapi-sprites@2.0.4/sprites/pokemon/${tq.poke.id}.png'">
        <div class="q-poke-info">
          <div class="top">答对此题可获得</div>
          <div class="name">${tq.poke.name}</div>
        </div>
      </div>
      <div class="q-text">${tq.text.replace(/\n/g,'<br>')}</div>
      ${action}
      <div class="fb ${fbCls}">${fbHtml}</div>
    </div>`;
  if(!locked) setTimeout(()=>{ const el=document.getElementById('ai'); if(el)el.focus(); },80);
}

function matchAns(val,tq){
  // Extract all numbers from correct answer and user input
  const aN = tq.ans.match(/\d+\.?\d*/g) || [];
  const uN = val.match(/\d+\.?\d*/g) || [];
  // All numbers in the answer must appear in the user's input
  if(aN.length > 0){
    return aN.every(n => uN.some(u => Math.abs(parseFloat(u)-parseFloat(n)) < 0.05));
  }
  // No numbers: text comparison
  const nm = s => s.replace(/[\s，。！？、,]/g,'').toLowerCase();
  return nm(val) === nm(tq.ans) || tq.ans.toLowerCase().includes(val.toLowerCase());
}

function checkAns(){
  if(S.gameOver) return;
  const inp=document.getElementById('ai'); if(!inp) return;
  const val=inp.value.trim(); if(!val){ inp.focus(); return; }
  const tq=S.todayQ[S.sel];
  tq.userAnswer=val;

  if(matchAns(val,tq)){
    tq.status='correct';
    S.correctLog.unshift({id:tq.id,ch:tq.ch,lbl:tq.lbl,text:tq.text,ans:val,date:today()});
    if(tq.type==='easy'){ if(!S.usedE.includes(tq.id))S.usedE.push(tq.id); }
    else{ if(!S.usedH.includes(tq.id))S.usedH.push(tq.id); }
  } else {
    // State machine: pending→wrong1→wrong2→failed
    if(tq.status==='pending')      tq.status='wrong1';
    else if(tq.status==='wrong1')  tq.status='wrong2';
    else if(tq.status==='wrong2'){
      tq.status='failed';
      // Check if all non-correct slots are also done
      const allDone=S.todayQ.every(q=>['correct','failed'].includes(q.status));
      if(allDone) S.gameOver=true;
    }
  }

  save(); renderCards(); renderQArea(); renderProg(); renderStats();

  const hasE  = S.todayQ.some(q=>q.type==='easy'&&q.status==='correct');
  const allH  = S.todayQ.filter(q=>q.type==='hard').every(q=>q.status==='correct');
  const allOk = hasE && allH;
  if(allOk && !S.rewarded){ S.rewarded=true; S.streak++; save(); setTimeout(showReward,700); }
  if(S.gameOver && !allOk) setTimeout(()=>showToast('😢 今天的机会用完了，明天继续加油！'),400);
}

/* =====================================================
   PROGRESS
===================================================== */
function dotState(q){
  if(!q) return '';
  if(q.status==='correct') return 'done';
  if(q.status==='failed')  return 'fail';
  return 'active';
}

function renderProg(){
  const qs     = S.todayQ;
  const easyQ  = qs.find(q=>q.type==='easy');
  const hardQs = qs.filter(q=>q.type==='hard');
  const hasE   = easyQ  && easyQ.status==='correct';
  const allH   = hardQs.length>0 && hardQs.every(q=>q.status==='correct');

  const d0=document.getElementById('pd0'), d1=document.getElementById('pd1'), d2=document.getElementById('pd2');
  if(!d0) return;

  // Dot 0 = easy
  d0.className='p-dot '+ dotState(easyQ);
  d0.textContent = easyQ?.status==='correct'?'✅': easyQ?.status==='failed'?'❌':'⭐';

  // Dots 1 & 2 = the two hard questions
  [d1,d2].forEach((dot,i)=>{
    const hq = hardQs[i];
    if(!dot) return;
    dot.className='p-dot '+ dotState(hq);
    dot.textContent = hq?.status==='correct'?'✅': hq?.status==='failed'?'❌':'🔥';
  });

  const nb=document.getElementById('newDrawBtn');
  if(nb){ nb.disabled=S.newDrawUsed||S.gameOver;
    nb.textContent=S.newDrawUsed
      ?'🎲 今日换题已使用（每天限1次）'
      :'🎲 换一组新题目（每天限1次）'; }

  const hint=document.getElementById('drawHint');
  const corrCount = S.todayQ.filter(q=>q.status==='correct').length;
  if(S.rewarded)
    hint.innerHTML='<strong style="color:#4ade80">🎉 今日目标达成！已获得宝可梦！</strong>';
  else if(S.gameOver)
    hint.innerHTML='<strong style="color:#f87171">🚫 今天的机会已用完，明天加油！</strong>';
  else if(corrCount===0)
    hint.innerHTML='翻开卡牌选择题目！<br>答对 <strong>⭐ 1道基础</strong> + <strong>🔥 2道挑战</strong>，获得宝可梦！';
  else if(corrCount===1)
    hint.innerHTML='还差 <strong>2道</strong> 就能获得宝可梦！继续加油 💪';
  else if(corrCount===2)
    hint.innerHTML='最后 <strong>1道</strong> 了！冲啊 🔥';
  else
    hint.innerHTML='<strong style="color:#4ade80">🎉 今日目标达成！已获得宝可梦！</strong>';
}

/* =====================================================
   REWARD
===================================================== */
function pickPoke(){
  const streak=S.streak;
  const hitM=MSTONES.includes(streak)&&!S.milestones.includes(streak);
  if(hitM){
    S.milestones.push(streak);
    if(streak>=30) return {...rand(MYTHIC), milestone:streak};
    if(streak>=14) return {...rand(LEGENDARY.filter(p=>p.req<=streak)), milestone:streak};
    if(streak>=7)  return {...rand(LEGENDARY.filter(p=>p.req<=streak)), milestone:streak};
    if(streak>=5)  return {...rand(LEGENDARY.filter(p=>p.req<=streak)), milestone:streak};
    return {...rand(RARE), milestone:streak}; // streak 3
  }
  const r=Math.random();
  if(r<.05) return rand(RARE);
  if(r<.20) return {...PIKACHU};
  return rand(COMMON);
}

function showReward(){
  const poke=pickPoke();
  S.dex.unshift({...poke, date:today(), streak:S.streak});
  save();

  const rc=document.getElementById('rCard');
  rc.className='r-card'+(poke.rarity==='legendary'?' lg':poke.rarity==='mythic'?' my':poke.rarity==='rare'?' ra':'');

  // Use official artwork for reward screen
  const spUrl=ARTWORK(poke.id);
  const img=document.getElementById('rSprite');
  img.src=spUrl;
  img.onerror=()=>{ img.onerror=null; img.src=`https://cdn.jsdelivr.net/npm/pokeapi-sprites@2.0.4/sprites/pokemon/${poke.id}.png`; };

  const rarityMap={common:'◇ NORMAL',rare:'◆ RARE',legendary:'★ LEGENDARY',mythic:'✦ MYTHIC'};
  const colMap={common:'#93c5fd',rare:'#c4b5fd',legendary:'#fdba74',mythic:'#f9a8d4'};
  const sparkMap={common:'✨🎊✨',rare:'🌟💜✨💜🌟',legendary:'⚡🌟🏆🌟⚡',mythic:'💫🌸✨🌸💫'};

  document.getElementById('rRarityLbl').textContent=rarityMap[poke.rarity]||rarityMap.common;
  document.getElementById('rRarityLbl').style.color=colMap[poke.rarity]||colMap.common;
  document.getElementById('rSparkle').textContent=sparkMap[poke.rarity]||sparkMap.common;
  document.getElementById('rTitle').textContent=`获得了 ${poke.name}！`;
  document.getElementById('rSub').textContent=`${poke.name} 已加入图鉴`;

  const ms=document.getElementById('rMilestone');
  if(poke.milestone){ ms.style.display='block'; ms.textContent=`🔥 ${poke.milestone}天连续！解锁特殊奖励！`; }
  else ms.style.display='none';

  document.getElementById('overlay').classList.add('show');
  renderStats();
}

function closeReward(){ document.getElementById('overlay').classList.remove('show'); showTab('dex'); }

/* =====================================================
   POKEDEX
===================================================== */
function renderDex(){
  const area=document.getElementById('dexArea');
  if(!S.dex.length){ area.innerHTML='<div class="empty"><span>📖</span>图鉴还是空的，答对今日两道题就能得到第一只宝可梦！</div>'; return; }
  area.innerHTML=`<div class="dex-grid">${S.dex.map(p=>`
    <div class="dex-item ${p.rarity==='rare'?'d-rare':p.rarity==='legendary'?'d-legendary':p.rarity==='mythic'?'d-mythic':''}">
      <img class="dex-sprite" src="${SPRITE(p.id)}" alt="${p.name}"
           onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/pokeapi-sprites@2.0.4/sprites/pokemon/${p.id}.png'"
           loading="lazy">
      <div class="dex-name">${p.name}</div>
      <div class="dex-date">${p.date}</div>
      ${p.streak?`<div class="dex-streak">🔥${p.streak}天</div>`:''}
    </div>`).join('')}</div>`;
}

/* =====================================================
   LOG
===================================================== */
function renderLog(){
  const area=document.getElementById('logArea');
  if(!S.correctLog.length){ area.innerHTML='<div class="empty"><span>📚</span>还没有答对的题目，加油！</div>'; return; }
  area.innerHTML=`<div class="log-list">${S.correctLog.map(it=>`
    <div class="log-item">
      <div class="log-chap">✅ ${it.ch} · ${it.lbl} · ${it.date}</div>
      <div class="log-q">${it.text.replace(/\n/g,' ').substring(0,100)}${it.text.length>100?'...':''}</div>
      <div class="log-ans">我的答案：${it.ans}</div>
    </div>`).join('')}</div>`;
}

/* =====================================================
   TABS
===================================================== */
function showTab(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+n).classList.add('on');
  document.getElementById('tab-'+n).classList.add('on');
  if(n==='dex') renderDex();
  if(n==='log') renderLog();
}

/* =====================================================
   TOAST
===================================================== */
let _toastTimer=null;
function showToast(msg, dur=3000){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'), dur);
}

init();
</script>
